// ═══════════════════════════════════════════════════════
// android/build.gradle — Project-level Gradle config
// ═══════════════════════════════════════════════════════

buildscript {
    ext.kotlin_version = '2.2.20'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath "com.android.tools.build:gradle:8.3.1"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        // Google services plugin for Firebase
        classpath "com.google.gms:google-services:4.4.1"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"

subprojects {
    // ✨ FIX 1: Prevent "Different Roots" Windows Crash
    // Keeps third-party plugin builds on their native drives (C:) instead of forcing them to D:
    if (project.name == "app") {
        project.buildDir = "${rootProject.buildDir}/${project.name}"
    } else {
        project.buildDir = "${project.projectDir}/build"
    }
}

subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

// ✨ FIX 2: Crash-Proof Namespace Injection
subprojects {
    project.plugins.withId("com.android.library") {
        project.android {
            if (namespace == null) {
                namespace project.group
            }
        }
    }
}